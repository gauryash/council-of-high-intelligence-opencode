name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="council-of-high-intelligence-${VERSION}.tar.gz"
          tar --exclude='./.git' \
              --exclude='./.github' \
              -czf "../${ARCHIVE}" .
          echo "ARCHIVE=$(pwd)/../${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Generate release notes
        id: changelog
        run: |
          # If a CHANGELOG.md exists with a section for this version, use it;
          # otherwise let GitHub auto-generate notes from commits.
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          fi
          printf 'notes<<EOF\n%s\nEOF\n' "${NOTES}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          if [ -n "${NOTES}" ]; then
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes "${NOTES}" \
              "${{ env.ARCHIVE }}"
          else
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes \
              "${{ env.ARCHIVE }}"
          fi
