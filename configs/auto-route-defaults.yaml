# Model tier mapping for opencode-go.
# Used by the coordinator when assigning models to council members.
# "high" = members requiring heavyweight analytical reasoning
# "mid"  = members requiring faster/practical analysis

provider_models:
  opencode_go:
    high: deepseek-v4-pro
    mid: deepseek-v4-flash

# Chairman defaults — used by SKILL.md STEP 1.7 selection algorithm.
chairman_defaults:
  opencode_go: deepseek-v4-pro

# Explicit override for the Chairman across all sessions.
# Leave null/commented to use the STEP 1.7 selection algorithm.
# Example:
#   chairman:
#     model: deepseek-v4-pro
chairman: null
